<!DOCTYPE html>
<html lang="sv">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silviahemmet Dashboard</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="dashboard">


    <!-- BAKGRUNDSBILD -->

    <img 
    class="master" 
    src="assets/master1.png"
    alt="Silviahemmet">


    <!-- LIVE KLOCKA -->

    <div class="clock-window">

        <div id="clock">
            --:--
        </div>

    </div>



    <!-- LIVE TEMPERATUR -->

    <div class="temp-window">

        <div id="temperature">
            --°
        </div>

    </div>



    <!-- LIVE VIND -->

    <div class="wind-window">

        <div id="wind">
            Vind -- km/h
        </div>

    </div>



</div>



<script src="js/script.js"></script>


</body>

</html>
